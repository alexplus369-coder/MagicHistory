<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScriptForge Viral</title>
  
  <!-- Cargar React y ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Cargar Babel para procesar JSX en el navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- Contenedor principal donde se montará la app -->
  <div id="root"></div>

  <!-- El código de la aplicación -->
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    /* ─── Google Fonts & Styles ─── */
    const FontLoader = () => (
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg: #0a0a0f;
          --bg2: #111118;
          --bg3: #18181f;
          --border: rgba(255,255,255,0.07);
          --border-accent: rgba(99,179,237,0.3);
          --text: #e8e8f0;
          --text-muted: #6b6b85;
          --text-dim: #9999b5;
          --cyan: #63b3ed;
          --coral: #fc8181;
          --purple: #b794f4;
          --green: #68d391;
          --amber: #f6ad55;
          --cyan-glow: rgba(99,179,237,0.12);
          --coral-glow: rgba(252,129,129,0.12);
          --purple-glow: rgba(183,148,244,0.12);
        }

        body { background: var(--bg); }

        .sf-app {
          min-height: 100vh;
          background: var(--bg);
          color: var(--text);
          font-family: 'Space Grotesk', sans-serif;
          padding: 24px 16px 64px;
        }

        .sf-noise {
          position: fixed; inset: 0; pointer-events: none; z-index: 0;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
          background-size: 200px;
          opacity: 0.4;
        }

        .sf-grid {
          position: fixed; inset: 0; pointer-events: none; z-index: 0;
          background-image: linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px),
                            linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px);
          background-size: 40px 40px;
        }

        .sf-container { max-width: 1160px; margin: 0 auto; position: relative; z-index: 1; }

        /* ─── Header ─── */
        .sf-header { text-align: center; margin-bottom: 48px; }

        .sf-badge {
          display: inline-flex; align-items: center; gap: 8px;
          background: var(--cyan-glow); border: 1px solid var(--border-accent);
          border-radius: 100px; padding: 6px 16px; margin-bottom: 20px;
          font-family: 'JetBrains Mono', monospace; font-size: 11px;
          color: var(--cyan); letter-spacing: 0.08em; text-transform: uppercase;
        }

        .sf-badge-dot {
          width: 6px; height: 6px; background: var(--cyan); border-radius: 50%;
          animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
          0%,100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.4; transform: scale(0.8); }
        }

        .sf-title {
          font-family: 'Syne', sans-serif;
          font-size: clamp(2.2rem, 5vw, 3.8rem);
          font-weight: 800;
          line-height: 1.05;
          letter-spacing: -0.02em;
          background: linear-gradient(135deg, #fff 0%, var(--cyan) 50%, var(--purple) 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          margin-bottom: 12px;
        }

        .sf-subtitle {
          color: var(--text-muted); font-size: 15px; max-width: 520px; margin: 0 auto;
          line-height: 1.6; font-weight: 300;
        }

        /* ─── Layout ─── */
        .sf-layout { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 1024px) { .sf-layout { grid-template-columns: 420px 1fr; align-items: start; } }

        /* ─── Panel ─── */
        .sf-panel {
          background: var(--bg2);
          border: 1px solid var(--border);
          border-radius: 20px;
          padding: 28px;
          position: relative;
          overflow: hidden;
        }

        .sf-panel::before {
          content: '';
          position: absolute; top: 0; left: 0; right: 0; height: 1px;
          background: linear-gradient(90deg, transparent, var(--cyan), transparent);
          opacity: 0.4;
        }

        .sf-panel-title {
          font-family: 'Syne', sans-serif;
          font-size: 13px; font-weight: 700; letter-spacing: 0.1em;
          text-transform: uppercase; color: var(--text-muted);
          margin-bottom: 24px; display: flex; align-items: center; gap: 8px;
        }

        .sf-panel-title::after {
          content: ''; flex: 1; height: 1px; background: var(--border);
        }

        /* ─── Field ─── */
        .sf-field { margin-bottom: 20px; }

        .sf-label {
          display: flex; align-items: center; gap: 6px;
          font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
          text-transform: uppercase; color: var(--text-dim);
          margin-bottom: 8px;
        }

        .sf-label-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

        .sf-textarea, .sf-select, .sf-input {
          width: 100%;
          background: var(--bg3);
          border: 1px solid var(--border);
          border-radius: 12px;
          color: var(--text);
          font-family: 'Space Grotesk', sans-serif;
          font-size: 14px;
          transition: border-color 0.2s, box-shadow 0.2s;
          outline: none;
        }

        .sf-textarea {
          height: 110px; padding: 14px 16px; resize: none; line-height: 1.6;
        }

        .sf-select { padding: 12px 16px; appearance: none; cursor: pointer; }
        .sf-input { padding: 12px 16px; }

        .sf-textarea:focus, .sf-select:focus, .sf-input:focus {
          border-color: var(--cyan); box-shadow: 0 0 0 3px var(--cyan-glow);
        }

        .sf-char-counter {
          text-align: right; font-size: 11px; color: var(--text-muted);
          margin-top: 4px; font-family: 'JetBrains Mono', monospace;
        }

        .sf-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        /* ─── Button ─── */
        .sf-btn {
          width: 100%; padding: 15px;
          background: linear-gradient(135deg, #2b6cb0, #553c9a);
          border: none; border-radius: 14px; cursor: pointer;
          font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
          color: #fff; letter-spacing: 0.03em;
          display: flex; align-items: center; justify-content: center; gap: 10px;
          transition: all 0.2s; margin-top: 8px;
          position: relative; overflow: hidden;
        }

        .sf-btn::after {
          content: ''; position: absolute; inset: 0;
          background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
          opacity: 0; transition: opacity 0.2s;
        }

        .sf-btn:hover:not(:disabled)::after { opacity: 1; }
        .sf-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(99,102,241,0.35); }
        .sf-btn:active:not(:disabled) { transform: translateY(0); }
        .sf-btn:disabled { background: var(--bg3); color: var(--text-muted); cursor: not-allowed; }

        .sf-btn-hint {
          font-size: 11px; color: var(--text-muted); text-align: center;
          margin-top: 10px; font-family: 'JetBrains Mono', monospace;
        }

        /* ─── Error ─── */
        .sf-error {
          background: var(--coral-glow); border: 1px solid rgba(252,129,129,0.3);
          color: var(--coral); padding: 12px 16px; border-radius: 10px;
          font-size: 13px; margin-bottom: 16px;
        }

        /* ─── Results Panel ─── */
        .sf-results { min-height: 500px; }

        .sf-empty {
          display: flex; flex-direction: column; align-items: center;
          justify-content: center; height: 400px; gap: 16px; text-align: center;
        }

        .sf-empty-icon {
          width: 64px; height: 64px; border: 2px dashed rgba(255,255,255,0.08);
          border-radius: 20px; display: flex; align-items: center; justify-content: center;
          font-size: 28px; opacity: 0.3;
        }

        .sf-empty-text { color: var(--text-muted); font-size: 14px; max-width: 280px; line-height: 1.6; }

        /* ─── Loading ─── */
        .sf-loading {
          display: flex; flex-direction: column; align-items: center;
          justify-content: center; height: 400px; gap: 24px;
        }

        .sf-spinner {
          position: relative; width: 56px; height: 56px;
        }

        .sf-spinner-ring {
          position: absolute; inset: 0; border-radius: 50%;
          border: 2px solid transparent;
        }

        .sf-spinner-ring:nth-child(1) {
          border-top-color: var(--cyan);
          animation: spin 1.2s linear infinite;
        }

        .sf-spinner-ring:nth-child(2) {
          border-right-color: var(--purple);
          animation: spin 1.8s linear infinite reverse;
          inset: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .sf-loading-steps { display: flex; flex-direction: column; gap: 8px; align-items: center; }

        .sf-loading-step {
          font-size: 12px; font-family: 'JetBrains Mono', monospace;
          opacity: 0; animation: step-in 0.5s ease forwards;
        }

        .sf-loading-step:nth-child(1) { color: var(--cyan); animation-delay: 0.2s; }
        .sf-loading-step:nth-child(2) { color: var(--purple); animation-delay: 1.4s; }
        .sf-loading-step:nth-child(3) { color: var(--green); animation-delay: 2.8s; }

        @keyframes step-in {
          from { opacity: 0; transform: translateY(6px); }
          to { opacity: 0.8; transform: translateY(0); }
        }

        /* ─── Result content ─── */
        .sf-result { animation: fade-up 0.5s ease; }

        @keyframes fade-up {
          from { opacity: 0; transform: translateY(16px); }
          to { opacity: 1; transform: translateY(0); }
        }

        .sf-result-header { margin-bottom: 24px; }

        .sf-result-title {
          font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800;
          color: #fff; line-height: 1.2; margin-bottom: 6px;
        }

        .sf-result-meta {
          font-size: 12px; color: var(--text-muted);
          font-family: 'JetBrains Mono', monospace; display: flex; gap: 16px; flex-wrap: wrap;
        }

        /* ─── Strategy cards ─── */
        .sf-strategy-grid {
          display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
          margin-bottom: 28px;
        }

        @media (max-width: 700px) { .sf-strategy-grid { grid-template-columns: 1fr; } }

        .sf-card {
          background: var(--bg3); border-radius: 14px; padding: 16px;
          border: 1px solid var(--border);
          transition: border-color 0.2s;
        }

        .sf-card:hover { border-color: rgba(255,255,255,0.12); }

        .sf-card-header {
          display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
        }

        .sf-card-icon { font-size: 16px; }

        .sf-card-label {
          font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
          text-transform: uppercase;
        }

        .sf-card-text { font-size: 12px; color: var(--text-dim); line-height: 1.6; }

        .sf-divider {
          height: 1px;
          background: linear-gradient(90deg, transparent, var(--border), transparent);
          margin: 24px 0;
        }

        /* ─── Export bar ─── */
        .sf-export-bar {
          display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 20px;
          flex-wrap: wrap;
        }

        .sf-mini-btn {
          display: flex; align-items: center; gap: 6px;
          background: var(--bg3); border: 1px solid var(--border);
          border-radius: 8px; padding: 7px 12px; cursor: pointer;
          font-size: 12px; font-weight: 600; color: var(--text-dim);
          font-family: 'Space Grotesk', sans-serif;
          transition: all 0.15s; white-space: nowrap;
        }

        .sf-mini-btn:hover { background: var(--bg); border-color: var(--cyan); color: var(--cyan); }

        /* ─── Scenes ─── */
        .sf-scenes-header {
          font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
          letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted);
          display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
        }

        .sf-scenes-header span:last-child {
          font-family: 'JetBrains Mono', monospace; font-size: 11px;
          background: var(--cyan-glow); color: var(--cyan); border-radius: 6px; padding: 2px 8px;
        }

        .sf-scene {
          position: relative; display: flex; gap: 16px; padding: 20px 0;
          border-bottom: 1px solid var(--border);
          animation: fade-up 0.4s ease both;
        }

        .sf-scene:last-child { border-bottom: none; }

        .sf-scene-num {
          flex-shrink: 0; width: 28px; height: 28px;
          background: var(--bg3); border: 1px solid var(--border);
          border-radius: 8px; display: flex; align-items: center; justify-content: center;
          font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
          color: var(--text-muted); margin-top: 2px;
        }

        .sf-scene-body { flex: 1; }

        .sf-scene-ts {
          display: inline-flex; align-items: center; gap: 5px;
          background: rgba(104,211,145,0.1); color: var(--green);
          border-radius: 6px; padding: 3px 8px;
          font-size: 11px; font-family: 'JetBrains Mono', monospace; font-weight: 500;
          margin-bottom: 10px;
        }

        .sf-scene-sub {
          font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700;
          color: #fff; line-height: 1.35; margin-bottom: 12px;
        }

        .sf-scene-sub::before { content: '❝ '; color: var(--cyan); opacity: 0.5; font-size: 14px; }
        .sf-scene-sub::after { content: ' ❞'; color: var(--cyan); opacity: 0.5; font-size: 14px; }

        .sf-prompt-box {
          background: #0d0d15; border: 1px solid var(--border);
          border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
          position: relative;
        }

        .sf-prompt-label {
          font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
          color: var(--purple); font-weight: 600; margin-bottom: 6px;
          display: flex; align-items: center; gap: 5px;
        }

        .sf-prompt-text {
          font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6;
          color: var(--text-dim);
        }

        .sf-copy-btn {
          position: absolute; top: 10px; right: 10px;
          background: var(--bg3); border: 1px solid var(--border);
          border-radius: 6px; padding: 4px 8px; cursor: pointer;
          font-size: 10px; font-weight: 600; color: var(--text-muted);
          font-family: 'Space Grotesk', sans-serif;
          transition: all 0.15s;
        }

        .sf-copy-btn:hover { color: var(--cyan); border-color: var(--cyan); }
        .sf-copy-btn.copied { color: var(--green); border-color: var(--green); }

        .sf-action-pill {
          display: inline-flex; align-items: center; gap: 6px;
          background: var(--cyan-glow); border-radius: 6px; padding: 5px 10px;
          font-size: 12px; color: var(--cyan);
        }

        /* ─── Engagement ─── */
        .sf-engagement {
          background: linear-gradient(135deg, rgba(246,173,85,0.08), rgba(252,129,129,0.08));
          border: 1px solid rgba(246,173,85,0.25);
          border-radius: 14px; padding: 20px;
          margin-top: 24px;
        }

        .sf-engagement-label {
          font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
          color: var(--amber); margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
        }

        .sf-engagement-text {
          font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700;
          color: #fff; line-height: 1.4;
        }
      `}</style>
    );

    /* ─── Icons (inline SVG) ─── */
    const Icon = ({ d, size = 14, color = "currentColor" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
        stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d={d} />
      </svg>
    );

    const ICONS = {
      wand: "M15 4V2m0 14v-2M8 9H6m14 0h-2M11.293 6.707l-1.414-1.414M17.121 12.536l-1.414-1.414M11.293 17.293l-1.414 1.414M17.121 11.465l-1.414 1.414M6 9a6 6 0 0112 0 6 6 0 01-12 0z",
      copy: "M8 4H6a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-2M8 4a2 2 0 002 2h4a2 2 0 002-2M8 4a2 2 0 012-2h4a2 2 0 012 2",
      download: "M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3",
      share: "M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13",
      reset: "M3 12a9 9 0 101.274-4.67M3 3v5h5",
      clock: "M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z",
      video: "M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14v-4z M4 6h8a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2z",
      target: "M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122",
      loop: "M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15",
      chat: "M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"
    };

    /* ─── Data ─── */
    const NARRATIVE_STYLES = [
      "Misterioso / Suspenso",
      "Humorístico / Comedia",
      "Educativo / Documental",
      "Dramático / Emocional",
      "Inspiracional / Motivacional",
      "Sarcástico / Crítico",
      "Storytelling Dinámico (Vlog)",
    ];

    const VISUAL_STYLES = [
      "Cinematográfico Realista (4K hiperrealista)",
      "Animación 3D (Estilo Pixar/Disney)",
      "Cyberpunk (Neón, futurista, oscuro)",
      "Acuarela / Ilustración dibujada a mano",
      "Anime (Estilo Studio Ghibli)",
      "Retro / Vintage (VHS, grano de película)",
      "Minimalista (Colores planos, vectores)",
    ];

    const DURATIONS = [
      "15 segundos (Short rápido)",
      "30 segundos (Estándar Reel/TikTok)",
      "60 segundos (Historia completa)",
      "90 segundos (Mini-documental)",
    ];

    /* ─── Helpers ─── */
    function useCopy() {
      const [copied, setCopied] = useState({});
      
      const copy = (text, key) => {
        try {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand('copy');
          document.body.removeChild(textArea);
          
          setCopied(p => ({ ...p, [key]: true }));
          setTimeout(() => setCopied(p => ({ ...p, [key]: false })), 2000);
        } catch (err) {
          console.error("Failed to copy", err);
        }
      };
      return { copied, copy };
    }

    function exportScript(result, params) {
      const lines = [
        `SCRIPTFORGE VIRAL — ${result.title}`,
        `${"─".repeat(60)}`,
        `Parámetros: ${params.narrativeStyle} | ${params.visualStyle} | ${params.duration}`,
        ``,
        `🎯 GANCHO: ${result.hookStrategy}`,
        `🔁 LOOP: ${result.loopStrategy}`,
        `📤 SHAREABILITY: ${result.shareabilityFactor}`,
        ``,
        `${"─".repeat(60)}`,
        `GUION ESCENA POR ESCENA`,
        `${"─".repeat(60)}`,
        ...result.scenes.flatMap((s, i) => [
          ``,
          `ESCENA ${i + 1} — ${s.timestamp}`,
          `SUBTÍTULO: "${s.subtitle}"`,
          `VISUAL PROMPT: ${s.visualPrompt}`,
          `ACCIÓN DE CÁMARA: ${s.cameraAction}`,
        ]),
        ``,
        `${"─".repeat(60)}`,
        `💬 ENGAGEMENT: ${result.engagementQuestion}`,
      ];
      const blob = new Blob([lines.join("\n")], { type: "text/plain" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `scriptforge-${Date.now()}.txt`;
      a.click();
    }

    /* ─── Main App ─── */
    function App() {
      // Estado para las API Keys y el modelo seleccionado
      const [geminiApiKey, setGeminiApiKey] = useState(() => localStorage.getItem("sf_gemini_key") || "");
      const [deepseekApiKey, setDeepseekApiKey] = useState(() => localStorage.getItem("sf_deepseek_key") || "");
      const [aiModel, setAiModel] = useState("gemini-1.5-flash");
      
      const [idea, setIdea] = useState("");
      const [narrativeStyle, setNarrativeStyle] = useState(NARRATIVE_STYLES[0]);
      const [visualStyle, setVisualStyle] = useState(VISUAL_STYLES[0]);
      const [duration, setDuration] = useState(DURATIONS[1]);
      const [keywords, setKeywords] = useState("");
      const [isGenerating, setIsGenerating] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [exportedParams, setExportedParams] = useState(null);

      const resultRef = useRef(null);
      const { copied, copy } = useCopy();

      // Guardar las API Keys en localStorage
      const handleGeminiKeyChange = (e) => {
        const val = e.target.value;
        setGeminiApiKey(val);
        localStorage.setItem("sf_gemini_key", val);
      };

      const handleDeepseekKeyChange = (e) => {
        const val = e.target.value;
        setDeepseekApiKey(val);
        localStorage.setItem("sf_deepseek_key", val);
      };

      /* Scroll to results on mobile */
      useEffect(() => {
        if (result && resultRef.current) {
          setTimeout(() => resultRef.current.scrollIntoView({ behavior: "smooth", block: "start" }), 100);
        }
      }, [result]);

      /* Keyboard shortcut */
      const handleKeyDown = useCallback((e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter" && !isGenerating) {
          generateStory();
        }
      }, [idea, isGenerating, narrativeStyle, visualStyle, duration, keywords, geminiApiKey, deepseekApiKey, aiModel]);

      useEffect(() => {
        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, [handleKeyDown]);

      const fetchWithRetry = async (url, options, retries = 5) => {
        let delay = 1000;
        for (let i = 0; i < retries; i++) {
          try {
            const res = await fetch(url, options);
            if (!res.ok) {
              if (res.status === 403 || res.status === 400) {
                 throw new Error("La API Key es inválida o no tiene permisos.");
              }
              throw new Error(`Error del servidor: ${res.status}`);
            }
            return await res.json();
          } catch (e) {
            if (i === retries - 1 || e.message.includes("API Key")) throw e;
            await new Promise(r => setTimeout(r, delay));
            delay *= 2; 
          }
        }
      };

      const generateStory = async () => {
        if (aiModel.startsWith("gemini") && !geminiApiKey.trim()) {
          setError("Por favor, ingresa tu API Key de Gemini en la configuración.");
          return;
        }
        if (aiModel.startsWith("deepseek") && !deepseekApiKey.trim()) {
          setError("Por favor, ingresa tu API Key de DeepSeek en la configuración.");
          return;
        }

        if (!idea.trim()) {
          setError("Ingresa una idea base para continuar.");
          return;
        }

        setIsGenerating(true);
        setError(null);
        setResult(null);

        const systemPrompt = `Eres un guionista experto en contenido viral para TikTok, Instagram Reels y YouTube Shorts.
        Responde ÚNICAMENTE con un objeto JSON válido. Sin texto extra, sin markdown.

        El JSON debe tener esta estructura exacta:
        {
          "title": "string",
          "hookStrategy": "string",
          "loopStrategy": "string",
          "shareabilityFactor": "string",
          "engagementQuestion": "string",
          "scenes": [
            {
              "timestamp": "string",
              "subtitle": "string",
              "visualPrompt": "string (en inglés, detallado, para generador de imágenes IA)",
              "cameraAction": "string"
            }
          ]
        }

        REGLAS CRÍTICAS:
        1. Los primeros 2 segundos deben tener un gancho que abra una "brecha de curiosidad" irresistible.
        2. La última frase debe conectar con la primera (loop perfecto) O revelar algo tan sorprendente que el espectador vea de nuevo.
        3. El contenido debe aportar "moneda social": quien lo comparta se ve inteligente, divertido o informado.
        4. Incluye las siguientes keywords (si se proporcionan): ${keywords || "Ninguna específica"}.
        5. Adapta el tono al estilo narrativo: ${narrativeStyle}.
        6. Las descripciones visuales (visualPrompt) deben encajar con el estilo: ${visualStyle}.
        7. Ajusta la cantidad de escenas a la duración estimada de: ${duration}.`;

        let url, fetchOptions;

        if (aiModel.startsWith("gemini")) {
          url = `https://generativelanguage.googleapis.com/v1beta/models/${aiModel}:generateContent?key=${geminiApiKey.trim()}`;
          fetchOptions = {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: `Idea principal: ${idea}` }] }],
              systemInstruction: { parts: [{ text: systemPrompt }] },
              generationConfig: { responseMimeType: "application/json" }
            })
          };
        } else {
          // DeepSeek API (compatible con formato de OpenAI)
          url = "https://api.deepseek.com/chat/completions";
          fetchOptions = {
            method: "POST",
            headers: { 
              "Content-Type": "application/json",
              "Authorization": `Bearer ${deepseekApiKey.trim()}`
            },
            body: JSON.stringify({
              model: aiModel,
              messages: [
                { role: "system", "content": systemPrompt },
                { role: "user", "content": `Idea principal: ${idea}` }
              ],
              response_format: { type: "json_object" }
            })
          };
        }

        try {
          const data = await fetchWithRetry(url, fetchOptions);
          let textResult = "";

          if (aiModel.startsWith("gemini")) {
            textResult = data.candidates?.[0]?.content?.parts?.[0]?.text;
          } else {
            textResult = data.choices?.[0]?.message?.content;
            // Limpiar posible formato Markdown de la respuesta de DeepSeek si lo incluye por error
            if (textResult) {
              textResult = textResult.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
            }
          }
          
          if (!textResult) {
            throw new Error("No text returned from API");
          }

          const parsedJson = JSON.parse(textResult);
          setResult(parsedJson);
          setExportedParams({ narrativeStyle, visualStyle, duration });

        } catch (err) {
          console.error(err);
          setError(err.message || "Hubo un error al generar tu guion viral. Por favor, inténtalo de nuevo.");
        } finally {
          setIsGenerating(false);
        }
      };

      return (
        <React.Fragment>
          <FontLoader />
          <div className="sf-app">
            <div className="sf-noise"></div>
            <div className="sf-grid"></div>

            <div className="sf-container">
              <header className="sf-header">
                <div className="sf-badge">
                  <div className="sf-badge-dot"></div>
                  Generador IA de Guiones
                </div>
                <h1 className="sf-title">ScriptForge Viral</h1>
                <p className="sf-subtitle">
                  Transforma una simple idea en un guion estructurado para TikTok, Reels o Shorts usando ingeniería inversa de la viralidad.
                </p>
              </header>

              <main className="sf-layout">
                {/* Sidebar Form */}
                <aside className="sf-panel">
                  <h2 className="sf-panel-title">
                    <Icon d={ICONS.target} size={16} /> Configuración del Video
                  </h2>

                  {error && (
                    <div className="sf-error">
                      <strong>Oops!</strong> {error}
                    </div>
                  )}

                  <div className="sf-grid-2">
                    <div className="sf-field">
                      <label className="sf-label">
                        <div className="sf-label-dot" style={{ backgroundColor: 'var(--cyan)' }}></div>
                        Modelo de IA
                      </label>
                      <select 
                        className="sf-select"
                        value={aiModel}
                        onChange={(e) => setAiModel(e.target.value)}
                      >
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                        <option value="deepseek-v4-flash">DeepSeek V4 Flash</option>
                        <option value="deepseek-v4-pro">DeepSeek V4 Pro</option>
                      </select>
                    </div>

                    <div className="sf-field">
                      <label className="sf-label">
                        <div className="sf-label-dot" style={{ backgroundColor: 'var(--purple)' }}></div>
                        API Key
                      </label>
                      {aiModel.startsWith("gemini") ? (
                        <input 
                          type="password"
                          className="sf-input"
                          placeholder="Clave de Gemini..."
                          value={geminiApiKey}
                          onChange={handleGeminiKeyChange}
                        />
                      ) : (
                        <input 
                          type="password"
                          className="sf-input"
                          placeholder="Clave de DeepSeek..."
                          value={deepseekApiKey}
                          onChange={handleDeepseekKeyChange}
                        />
                      )}
                    </div>
                  </div>
                  <div className="sf-char-counter" style={{marginTop: '-10px', marginBottom: '20px'}}>Se guarda en tu navegador de forma segura</div>

                  <div className="sf-field">
                    <label className="sf-label">
                      <div className="sf-label-dot" style={{ backgroundColor: 'var(--amber)' }}></div>
                      Idea Base
                    </label>
                    <textarea 
                      className="sf-textarea"
                      placeholder="Ej: Tres trucos psicológicos para dejar de procastinar..."
                      value={idea}
                      onChange={(e) => setIdea(e.target.value)}
                    />
                    <div className="sf-char-counter">{idea.length} / 300</div>
                  </div>

                  <div className="sf-grid-2">
                    <div className="sf-field">
                      <label className="sf-label">
                        <div className="sf-label-dot" style={{ backgroundColor: 'var(--purple)' }}></div>
                        Estilo Narrativo
                      </label>
                      <select 
                        className="sf-select"
                        value={narrativeStyle}
                        onChange={(e) => setNarrativeStyle(e.target.value)}
                      >
                        {NARRATIVE_STYLES.map(style => <option key={style} value={style}>{style}</option>)}
                      </select>
                    </div>

                    <div className="sf-field">
                      <label className="sf-label">
                        <div className="sf-label-dot" style={{ backgroundColor: 'var(--green)' }}></div>
                        Duración
                      </label>
                      <select 
                        className="sf-select"
                        value={duration}
                        onChange={(e) => setDuration(e.target.value)}
                      >
                        {DURATIONS.map(d => <option key={d} value={d}>{d}</option>)}
                      </select>
                    </div>
                  </div>

                  <div className="sf-field">
                    <label className="sf-label">
                      <div className="sf-label-dot" style={{ backgroundColor: 'var(--coral)' }}></div>
                      Estilo Visual (Para IA)
                    </label>
                    <select 
                      className="sf-select"
                      value={visualStyle}
                      onChange={(e) => setVisualStyle(e.target.value)}
                    >
                      {VISUAL_STYLES.map(style => <option key={style} value={style}>{style}</option>)}
                    </select>
                  </div>

                  <div className="sf-field">
                    <label className="sf-label">
                      <div className="sf-label-dot" style={{ backgroundColor: 'var(--cyan)' }}></div>
                      Palabras Clave (SEO)
                    </label>
                    <input 
                      type="text"
                      className="sf-input"
                      placeholder="Ej: productividad, hábitos, psicología..."
                      value={keywords}
                      onChange={(e) => setKeywords(e.target.value)}
                    />
                  </div>

                  <button 
                    className="sf-btn"
                    onClick={generateStory}
                    disabled={isGenerating || !idea.trim()}
                  >
                    <Icon d={ICONS.wand} size={18} />
                    {isGenerating ? "Forjando Guion..." : "Generar Guion Viral"}
                  </button>
                  <div className="sf-btn-hint">Presiona Cmd/Ctrl + Enter para generar</div>
                </aside>

                {/* Results Area */}
                <section className="sf-panel sf-results" ref={resultRef}>
                  
                  {!isGenerating && !result && (
                    <div className="sf-empty">
                      <div className="sf-empty-icon">🎬</div>
                      <p className="sf-empty-text">
                        La pantalla está en blanco. Describe tu idea en el panel izquierdo y la IA forjará un guion optimizado para retención.
                      </p>
                    </div>
                  )}

                  {isGenerating && (
                    <div className="sf-loading">
                      <div className="sf-spinner">
                        <div className="sf-spinner-ring"></div>
                        <div className="sf-spinner-ring"></div>
                      </div>
                      <div className="sf-loading-steps">
                        <div className="sf-loading-step">Analizando algoritmos de retención...</div>
                        <div className="sf-loading-step">Estructurando gancho y loop...</div>
                        <div className="sf-loading-step">Generando prompts visuales...</div>
                      </div>
                    </div>
                  )}

                  {result && !isGenerating && (
                    <div className="sf-result">
                      <div className="sf-export-bar">
                        <button className="sf-mini-btn" onClick={() => copy(JSON.stringify(result, null, 2), 'json')}>
                          <Icon d={ICONS.copy} size={14} />
                          {copied['json'] ? "¡Copiado!" : "Copiar JSON"}
                        </button>
                        <button className="sf-mini-btn" onClick={() => exportScript(result, exportedParams)}>
                          <Icon d={ICONS.download} size={14} />
                          Exportar .TXT
                        </button>
                        <button className="sf-mini-btn" onClick={() => {
                          setIdea(""); setResult(null); setKeywords(""); window.scrollTo(0,0);
                        }}>
                          <Icon d={ICONS.reset} size={14} />
                          Nuevo
                        </button>
                      </div>

                      <div className="sf-result-header">
                        <h2 className="sf-result-title">{result.title}</h2>
                        <div className="sf-result-meta">
                          <span><Icon d={ICONS.clock} size={12} style={{ display: 'inline', marginRight: 4, verticalAlign: '-2px'}}/> {exportedParams.duration}</span>
                          <span><Icon d={ICONS.video} size={12} style={{ display: 'inline', marginRight: 4, verticalAlign: '-2px'}}/> {exportedParams.visualStyle}</span>
                        </div>
                      </div>

                      <div className="sf-strategy-grid">
                        <div className="sf-card">
                          <div className="sf-card-header">
                            <span className="sf-card-icon" style={{color: 'var(--coral)'}}>🎯</span>
                            <span className="sf-card-label" style={{color: 'var(--coral)'}}>Estrategia Gancho</span>
                          </div>
                          <p className="sf-card-text">{result.hookStrategy}</p>
                        </div>
                        <div className="sf-card">
                          <div className="sf-card-header">
                            <span className="sf-card-icon" style={{color: 'var(--cyan)'}}>🔁</span>
                            <span className="sf-card-label" style={{color: 'var(--cyan)'}}>Loop Perfecto</span>
                          </div>
                          <p className="sf-card-text">{result.loopStrategy}</p>
                        </div>
                        <div className="sf-card">
                          <div className="sf-card-header">
                            <span className="sf-card-icon" style={{color: 'var(--purple)'}}>📤</span>
                            <span className="sf-card-label" style={{color: 'var(--purple)'}}>Shareability</span>
                          </div>
                          <p className="sf-card-text">{result.shareabilityFactor}</p>
                        </div>
                      </div>

                      <div className="sf-scenes-header">
                        Guion Escena por Escena <span>{result.scenes.length} Clips</span>
                      </div>

                      <div className="sf-scenes-list">
                        {result.scenes.map((scene, index) => (
                          <div className="sf-scene" key={index}>
                            <div className="sf-scene-num">{index + 1}</div>
                            <div className="sf-scene-body">
                              <div className="sf-scene-ts">⏱ {scene.timestamp}</div>
                              <div className="sf-scene-sub">{scene.subtitle}</div>
                              
                              <div className="sf-prompt-box">
                                <button 
                                  className={`sf-copy-btn ${copied[`prompt-${index}`] ? 'copied' : ''}`}
                                  onClick={() => copy(scene.visualPrompt, `prompt-${index}`)}
                                >
                                  {copied[`prompt-${index}`] ? '¡Copiado!' : 'Copiar Prompt'}
                                </button>
                                <div className="sf-prompt-label">
                                  <Icon d={ICONS.wand} size={12} color="var(--purple)" />
                                  Visual Prompt (Midjourney / DALL-E)
                                </div>
                                <div className="sf-prompt-text">{scene.visualPrompt}</div>
                              </div>

                              <div className="sf-action-pill">
                                <Icon d={ICONS.video} size={12} />
                                {scene.cameraAction}
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>

                      <div className="sf-engagement">
                        <div className="sf-engagement-label">
                          <Icon d={ICONS.chat} size={14} /> CTA (Call to Action)
                        </div>
                        <p className="sf-engagement-text">"{result.engagementQuestion}"</p>
                      </div>

                    </div>
                  )}

                </section>
              </main>
            </div>
          </div>
        </React.Fragment>
      );
    }

    // Renderizar la app en el navegador
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
